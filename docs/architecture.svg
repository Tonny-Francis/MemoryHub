  <text x="270" y="360" font-size="11" font-weight="700" fill="#748ffc">ADR Format (log_decision)</text>
  <text x="240" y="378" font-size="9.5" fill="#74c0fc" font-family="'SF Mono', monospace">## Context    what problem triggered this decision</text>
  <text x="240" y="392" font-size="9.5" fill="#74c0fc" font-family="'SF Mono', monospace">## Decision   what was decided</text>
  <text x="240" y="406" font-size="9.5" fill="#74c0fc" font-family="'SF Mono', monospace">## Alternatives   what else was considered</text>
  <text x="240" y="420" font-size="9.5" fill="#74c0fc" font-family="'SF Mono', monospace">## Consequences   + wins  − trade-offs</text>

  <!-- Phase 2 -->
  <rect x="230" y="456" width="420" height="50" rx="8" fill="#1a0a2e" stroke="#7c3aed40" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="440" y="476" text-anchor="middle" font-size="11" font-weight="600" fill="#9775fa">Phase 2 — Semantic Search</text>
  <text x="440" y="494" text-anchor="middle" font-size="10" fill="#666">pgvector + embeddings · semantic_search tool · related_decisions</text>

