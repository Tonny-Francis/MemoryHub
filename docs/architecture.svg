<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b5bdb"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2f9e44"/>
    </marker>
    <marker id="arr3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e67700"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" fill="url(#bg)" rx="16"/>

  <!-- Lane backgrounds -->
  <!-- Dev -->
  <rect x="14" y="14" width="190" height="532" rx="10" fill="#ffffff08" stroke="#ffffff12" stroke-width="1"/>
  <!-- EKS -->
  <rect x="218" y="14" width="452" height="532" rx="10" fill="#4f8ef708" stroke="#4f8ef720" stroke-width="1"/>
  <!-- Sources -->
  <rect x="684" y="14" width="202" height="532" rx="10" fill="#2f9e4408" stroke="#2f9e4420" stroke-width="1"/>

  <!-- Lane labels -->
  <text x="109" y="36" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff40" letter-spacing="1.5">DEV / AI ASSISTANT</text>
  <text x="444" y="36" text-anchor="middle" font-size="10" font-weight="700" fill="#4f8ef760" letter-spacing="1.5">EKS CLUSTER — second-brain namespace</text>
  <text x="785" y="36" text-anchor="middle" font-size="10" font-weight="700" fill="#2f9e4460" letter-spacing="1.5">SOURCES</text>

  <!-- ══════════════ DEV LANE ══════════════ -->

  <!-- Claude Code card -->
  <rect x="26" y="52" width="166" height="60" rx="8" fill="#1e2540" stroke="#3b5bdb60" stroke-width="1.5"/>
