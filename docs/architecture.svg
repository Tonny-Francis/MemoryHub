  <text x="550" y="199" text-anchor="middle" font-size="10" fill="#9ca3af">CronJob K8s · every 6h</text>
  <!-- Steps -->
  <circle cx="468" cy="218" r="8" fill="#e6770030"/><text x="468" y="222" text-anchor="middle" font-size="9" fill="#ffa94d" font-weight="700">1</text>
  <text x="482" y="222" font-size="9.5" fill="#d9d9d9">Poll GitLab MRs + commits</text>
  <circle cx="468" cy="236" r="8" fill="#e6770030"/><text x="468" y="240" text-anchor="middle" font-size="9" fill="#ffa94d" font-weight="700">2</text>
  <text x="482" y="240" font-size="9.5" fill="#d9d9d9">Read Discord #decisions</text>
  <circle cx="468" cy="254" r="8" fill="#e6770030"/><text x="468" y="258" text-anchor="middle" font-size="9" fill="#ffa94d" font-weight="700">3</text>
  <text x="482" y="258" font-size="9.5" fill="#d9d9d9">Scan Trello decision cards</text>
  <circle cx="468" cy="272" r="8" fill="#3b5bdb30"/><text x="468" y="276" text-anchor="middle" font-size="9" fill="#748ffc" font-weight="700">4</text>
  <text x="482" y="276" font-size="9.5" fill="#d9d9d9">Claude Haiku extracts ADR</text>
  <circle cx="468" cy="290" r="8" fill="#2f9e4430"/><text x="468" y="294" text-anchor="middle" font-size="9" fill="#51cf66" font-weight="700">5</text>
  <text x="482" y="294" font-size="9.5" fill="#d9d9d9">Save to drafts/ → UI confirm</text>

