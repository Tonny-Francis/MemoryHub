  <text x="36" y="260" font-size="10" fill="#9ca3af" font-family="'SF Mono', monospace">get_context</text>
  <text x="36" y="274" font-size="10" fill="#9ca3af" font-family="'SF Mono', monospace">log_decision</text>
  <text x="36" y="288" font-size="10" fill="#9ca3af" font-family="'SF Mono', monospace">search_vault</text>
  <text x="36" y="302" font-size="10" fill="#9ca3af" font-family="'SF Mono', monospace">confirm_draft</text>
  <text x="36" y="316" font-size="10" fill="#9ca3af" font-family="'SF Mono', monospace">read/write_vault_file</text>

