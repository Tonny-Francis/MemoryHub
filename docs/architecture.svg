  <text x="550" y="92" text-anchor="middle" font-size="10" fill="#9ca3af">In-cluster Deployment + PVC</text>
  <text x="550" y="108" text-anchor="middle" font-size="10" fill="#9ca3af">Users · Sessions · Projects</text>
  <text x="550" y="123" text-anchor="middle" font-size="9" fill="#666">50m/64Mi → 200m/256Mi</text>

