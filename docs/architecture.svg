  <line x1="330" y1="142" x2="330" y2="162" stroke="#2f9e44" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- MCP → PG -->
  <line x1="430" y1="82" x2="450" y2="82" stroke="#e67700" stroke-width="1.5" marker-end="url(#arr3)"/>

  <!-- Worker → Vault -->
