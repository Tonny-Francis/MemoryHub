  <text x="109" y="388" text-anchor="middle" font-size="10" fill="#9ca3af">Login · Projects</text>
  <text x="109" y="402" text-anchor="middle" font-size="10" fill="#9ca3af">Search · Confirm Drafts</text>
  <text x="109" y="416" text-anchor="middle" font-size="10" fill="#9ca3af">Manage users</text>

