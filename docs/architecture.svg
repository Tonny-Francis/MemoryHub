  <text x="109" y="87" text-anchor="middle" font-size="10" fill="#9ca3af">MCP global config</text>
  <text x="109" y="102" text-anchor="middle" font-size="10" fill="#9ca3af">~/.claude/settings.json</text>

  <!-- get_context compact -->
  <rect x="26" y="128" width="166" height="78" rx="8" fill="#0f1f0f" stroke="#2f9e4450" stroke-width="1.5"/>
  <text x="109" y="147" text-anchor="middle" font-size="11" font-weight="700" fill="#51cf66">get_context</text>
  <rect x="36" y="154" width="146" height="44" rx="5" fill="#0a1a0a"/>
  <text x="46" y="168" font-size="9" fill="#6fcf97" font-family="'SF Mono', monospace">Stack: Go, PG, gRPC</text>
  <text x="46" y="180" font-size="9" fill="#6fcf97" font-family="'SF Mono', monospace">✓ gRPC (latência) 07-01</text>
  <text x="46" y="192" font-size="9" fill="#6fcf97" font-family="'SF Mono', monospace">! retry msgs (aberto)</text>
  <rect x="26" y="209" width="56" height="14" rx="7" fill="#2f9e4430"/>
  <text x="54" y="220" text-anchor="middle" font-size="9" font-weight="700" fill="#51cf66">~800 tokens</text>

