  <line x1="696" y1="164" x2="652" y2="220" stroke="#5865f2" stroke-width="1" marker-end="url(#arr3)" stroke-dasharray="4,3" opacity="0.7"/>
  <line x1="696" y1="244" x2="654" y2="240" stroke="#0079bf" stroke-width="1" marker-end="url(#arr3)" stroke-dasharray="4,3" opacity="0.7"/>

  <!-- Title -->
