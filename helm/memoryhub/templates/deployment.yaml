apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "memoryhub.fullname" . }}
  labels:
    {{- include "memoryhub.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "memoryhub.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "memoryhub.selectorLabels" . | nindent 8 }}
    spec:
      initContainers:
        {{- if .Values.postgres.enabled }}
        - name: wait-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "memoryhub.fullname" . }}-postgres 5432; do
                echo "waiting for postgres..."; sleep 2;
              done
        {{- end }}
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["npx", "prisma", "migrate", "deploy"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  {{- if .Values.postgres.enabled }}
                  name: {{ include "memoryhub.fullname" . }}-postgres
                  key: url
                  {{- else }}
                  name: {{ .Values.secrets.existingSecret }}
                  key: databaseUrl
                  {{- end }}
      containers:
        - name: memoryhub
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: {{ .Values.config.nodeEnv | quote }}
            - name: PORT
              value: {{ .Values.config.port | quote }}
            - name: JWT_EXPIRES_IN
              value: {{ .Values.config.jwtExpiresIn | quote }}
            - name: JWT_REFRESH_EXPIRES_IN
              value: {{ .Values.config.jwtRefreshExpiresIn | quote }}
            - name: VAULT_DIR
              value: {{ .Values.config.vaultDir | quote }}
            - name: GIT_SYNC_INTERVAL_MS
              value: {{ .Values.config.gitSyncIntervalMs | quote }}
            - name: GIT_USER_NAME
              value: {{ .Values.config.gitUserName | quote }}
            - name: GIT_USER_EMAIL
              value: {{ .Values.config.gitUserEmail | quote }}
            - name: GITLAB_URL
              value: {{ .Values.config.gitlabUrl | quote }}
            # Database — use bundled postgres secret when enabled, otherwise user-provided secret
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  {{- if .Values.postgres.enabled }}
                  name: {{ include "memoryhub.fullname" . }}-postgres
                  key: url
                  {{- else }}
                  name: {{ .Values.secrets.existingSecret }}
                  key: databaseUrl
                  {{- end }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: jwtSecret
            - name: INITIAL_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: initialAdminEmail
                  optional: true
            - name: INITIAL_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: initialAdminPassword
                  optional: true
            - name: GIT_VAULT_REPO_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: gitVaultRepoUrl
                  optional: true
            - name: GITLAB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: gitlabToken
                  optional: true
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: discordBotToken
                  optional: true
            - name: DISCORD_CHANNEL_IDS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: discordChannelIds
                  optional: true
            - name: TRELLO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: trelloApiKey
                  optional: true
            - name: TRELLO_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: trelloToken
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: anthropicApiKey
                  optional: true
          volumeMounts:
            - name: vault
              mountPath: {{ .Values.config.vaultDir }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: vault
          {{- if .Values.vault.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "memoryhub.fullname" . }}-vault
          {{- else }}
          emptyDir: {}
          {{- end }}
