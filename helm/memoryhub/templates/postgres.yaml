{{- if .Values.postgres.enabled }}
# ── Init ConfigMap ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "memoryhub.fullname" . }}-postgres-init
  labels:
    {{- include "memoryhub.labels" . | nindent 4 }}
data:
  01-vector.sql: |
    CREATE EXTENSION IF NOT EXISTS vector;
---
# ── Secret ────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "memoryhub.fullname" . }}-postgres
  labels:
    {{- include "memoryhub.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ .Values.postgres.password | quote }}
  url: "postgresql://{{ .Values.postgres.user }}:{{ .Values.postgres.password }}@{{ include "memoryhub.fullname" . }}-postgres:5432/{{ .Values.postgres.database }}"
---
# ── PVC ───────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "memoryhub.fullname" . }}-postgres
  labels:
    {{- include "memoryhub.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.postgres.persistence.storageClass }}
  storageClassName: {{ .Values.postgres.persistence.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.postgres.persistence.size }}
---
# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "memoryhub.fullname" . }}-postgres
  labels:
    {{- include "memoryhub.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "memoryhub.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        {{- include "memoryhub.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "memoryhub.fullname" . }}-postgres
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d/01-vector.sql
              subPath: 01-vector.sql
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.user | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.user | quote }}]
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "memoryhub.fullname" . }}-postgres
        - name: initdb
          configMap:
            name: {{ include "memoryhub.fullname" . }}-postgres-init
---
# ── Service ───────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: {{ include "memoryhub.fullname" . }}-postgres
  labels:
    {{- include "memoryhub.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    {{- include "memoryhub.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
{{- end }}
